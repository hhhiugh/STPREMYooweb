<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Item - Admin</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilos originais mantidos para não quebrar o layout */
        .add-item-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            font-family: sans-serif;
        }
        
        .form-header { text-align: center; margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group.full-width { grid-column: span 2; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        
        input, textarea, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.3s;
            box-sizing: border-box; /* Garante que o padding não quebre a largura */
        }
        
        input:focus, textarea:focus, select:focus { border-color: #667eea; outline: none; }
        
        .image-preview {
            width: 218px;
            height: 218px;
            border: 2px dashed #ccc;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
            overflow: hidden;
            background: #f9f9f9;
        }
        
        .image-preview img { max-width: 100%; max-height: 100%; }
        .region-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        
        .region-btn {
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            background: white;
            cursor: pointer;
            flex: 1;
            text-align: center;
            transition: 0.3s;
        }
        
        .region-btn.active { background: #667eea; color: white; border-color: #667eea; }
        .account-format { background: #f8f9fa; padding: 15px; border-radius: 5px; margin: 10px 0; font-family: monospace; white-space: pre-wrap; font-size: 13px; }
        
        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body style="background-color: #f0f2f5; margin: 0;">
    <div class="add-item-container">
        <div class="form-header">
            <h1><i class="fas fa-plus-circle"></i> Add New Account Item</h1>
            <p>Preencha os detalhes para listar a conta</p>
        </div>
        
        <form id="addItemForm" action="#" method="POST" enctype="multipart/form-data">
            <div class="form-group full-width">
                <label><i class="fas fa-image"></i> Item Image (218x218 pixels)</label>
                <input type="file" name="image" accept="image/*" required onchange="previewImage(this)">
                <div class="image-preview" id="imagePreview">
                    <span>Preview da Imagem</span>
                </div>
            </div>
            
            <div class="form-grid">
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Item Name</label>
                    <input type="text" name="name" id="itemName" placeholder="ex: Premium Netflix" required>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-hashtag"></i> Item ID</label>
                    <input type="text" name="item_id" id="itemID" placeholder="ex: NET-001" required>
                </div>
            </div>
            
            <div class="form-group full-width">
                <label><i class="fas fa-align-left"></i> Description</label>
                <textarea name="description" rows="4" placeholder="Descrição da conta..."></textarea>
            </div>
            
            <div class="form-group full-width">
                <label><i class="fas fa-globe"></i> Region</label>
                <div class="region-buttons">
                    <div class="region-btn" onclick="selectRegion('IND')">IND</div>
                    <div class="region-btn" onclick="selectRegion('PK')">PK</div>
                </div>
                <input type="hidden" name="region" id="region" required>
            </div>
            
            <div class="form-group full-width">
                <label><i class="fas fa-users"></i> Accounts List</label>
                <div class="account-format">Formato aceito: uid:password</div>
                <textarea name="accounts" rows="5" placeholder="4428306395:SENHA123" required></textarea>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-dollar-sign"></i> Price ($)</label>
                <input type="number" name="price" step="0.01" min="0" placeholder="9.99" required>
            </div>
            
            <button type="submit" class="submit-btn">
                <i class="fas fa-save"></i> Save Item
            </button>
        </form>
    </div>
    
    <script>
        let selectedRegion = '';
        
        function previewImage(input) {
            const preview = document.getElementById('imagePreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
        
        function selectRegion(region) {
            selectedRegion = region;
            document.getElementById('region').value = region;
            document.querySelectorAll('.region-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === region) btn.classList.add('active');
            });
        }

        // Gerador automático de ID via JS
        document.getElementById('itemName').addEventListener('blur', function() {
            const idInput = document.getElementById('itemID');
            if (!idInput.value) {
                const name = this.value;
                const id = name.toUpperCase().replace(/[^A-Z0-9]/g, '-') + '-' + 
                          Math.random().toString(36).substr(2, 5).toUpperCase();
                idInput.value = id;
            }
        });

        // Previne o reload do form para teste no GitHub
        document.getElementById('addItemForm').addEventListener('submit', function(e) {
            if(this.getAttribute('action') === '#') {
                e.preventDefault();
                alert('Modo demonstração: No GitHub Pages (estático) o envio precisa de uma API externa configurada.');
            }
        });
    </script>
</body>
</html>
