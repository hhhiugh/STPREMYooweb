<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dashboard — UID/JWT Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* [Estilos originais mantidos - Omitidos aqui para brevidade, mas devem ser os mesmos que você enviou] */
        :root { --bg: #0a0608; --surface: #120a0c; --card: #1a0e10; --border: rgba(232,48,74,0.15); --accent: #e8304a; --accent2: #ff6b35; --accent-soft: rgba(232,48,74,0.12); --green: #00e5a0; --red: #ff4f6a; --amber: #ffb547; --blue: #60a5fa; --text: #f0e8ea; --muted: #7a6068; --font-head: 'Rajdhani', sans-serif; --font-mono: 'Share Tech Mono', monospace; --font-body: 'Exo 2', sans-serif; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background:var(--bg); color:var(--text); font-family:var(--font-body); min-height:100vh; overflow-x:hidden; padding-bottom:40px; }
        canvas#bg-canvas { position:fixed; inset:0; z-index:0; opacity:0.35; pointer-events:none; }
        .orb { position:fixed; border-radius:50%; filter:blur(120px); pointer-events:none; z-index:0; }
        .orb-1 { width:500px; height:500px; background:var(--accent); opacity:0.06; top:-150px; right:-100px; }
        .orb-2 { width:400px; height:400px; background:var(--accent2); opacity:0.04; bottom:0; left:-100px; }
        .topbar { position:sticky; top:0; z-index:200; background:rgba(10,6,8,0.92); backdrop-filter:blur(24px); border-bottom:1px solid var(--border); padding:0 16px; height:58px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
        .brand-icon-sm { width:36px; height:36px; background:linear-gradient(135deg, var(--accent), var(--accent2)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px; color:white; box-shadow:0 0 18px rgba(232,48,74,0.4); }
        .brand-name { font-family:var(--font-head); font-size:18px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
        .brand-name span { color:var(--accent); }
        .content { position:relative; z-index:10; padding:24px 16px 0; }
        .timer-hero { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:24px 20px; position:relative; overflow:hidden; margin-bottom:14px; box-shadow:0 12px 40px rgba(0,0,0,0.5); }
        .timer-value { font-family:var(--font-mono); font-size:36px; color:var(--accent); text-shadow:0 0 20px rgba(232,48,74,0.4); }
        .info-card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:18px 16px; margin-bottom:14px; }
        .info-row { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); }
        .info-val { color:var(--accent); font-family:var(--font-mono); }
        .btn-primary { width:100%; padding:15px; background:linear-gradient(135deg, var(--accent), #c0203a); color:white; border:none; border-radius:14px; font-weight:700; cursor:pointer; text-transform:uppercase; }
        .panel { display:none; } .panel.active { display:block; }
        .tab { flex:1; padding:13px; text-align:center; cursor:pointer; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:14px; color:var(--muted); }
        .tab.active { background:var(--accent-soft); color:var(--accent); }
        input, textarea { width:100%; padding:13px; background:rgba(0,0,0,0.4); border:1px solid var(--border); border-radius:12px; color:white; margin-top:5px; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="topbar">
        <div class="topbar-brand">
            <div class="brand-icon-sm"><i class="fa-solid fa-key"></i></div>
            <div class="brand-name">UID <span>&</span> JWT</div>
        </div>
        <div class="user-badge-pill" style="color: #00e5a0; font-family: monospace; font-size: 10px;">
            ● FREE USER
        </div>
    </div>

    <div class="content">
        <div class="timer-hero">
            <div class="timer-label" style="font-size: 10px; color: #7a6068; margin-bottom: 5px;">ACCESS REMAINING</div>
            <div class="timer-value" id="timer">23:59:59</div>
            <div class="timer-sub" style="font-size: 10px; color: #7a6068;">// SESSION ACTIVE</div>
        </div>

        <div class="info-card">
            <div class="info-row">
                <span>OID</span>
                <span class="info-val" id="oid">AUTO_GEN_8821</span>
            </div>
            <div class="info-row">
                <span>Server IP</span>
                <span class="info-val">65.108.39.249</span>
            </div>
        </div>

        <div class="tabs" style="display: flex; gap: 10px; margin-bottom: 20px;">
            <div class="tab active" id="tab-jwt" onclick="switchTab('jwt')">Via JWT</div>
            <div class="tab" id="tab-token" onclick="switchTab('token')">Via Token</div>
        </div>

        <div id="jwtPanel" class="panel active">
            <input type="text" id="jwtUid" placeholder="Enter UID">
            <textarea id="jwtToken" placeholder="Paste JWT token here" style="margin-top: 10px; height: 100px;"></textarea>
            <button onclick="saveViaJWT()" class="btn-primary" style="margin-top: 15px;">Save & Continue</button>
        </div>

        <div id="tokenPanel" class="panel">
            <textarea id="accessToken" placeholder="Paste Access Token here" style="height: 100px;"></textarea>
            <button onclick="convertAndSave()" class="btn-primary" style="margin-top: 15px;">Convert & Save</button>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById(tab + 'Panel').classList.add('active');
        }

        // Simulação de Timer
        let time = 86400;
        setInterval(() => {
            time--;
            let h = Math.floor(time / 3600);
            let m = Math.floor((time % 3600) / 60);
            let s = time % 60;
            document.getElementById('timer').innerText = `${h}:${m}:${s}`;
        }, 1000);

        // Lógica do Canvas (Resumida para performance)
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let W = canvas.width = window.innerWidth;
        let H = canvas.height = window.innerHeight;
        function draw() {
            ctx.clearRect(0,0,W,H);
            ctx.fillStyle = "rgba(232, 48, 74, 0.2)";
            for(let i=0; i<30; i++) {
                ctx.fillText("01", Math.random()*W, Math.random()*H);
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
