<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Produto - AccountStore</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #1a0e10; padding: 20px; border-radius: 15px; border: 1px solid #e8304a; width: 90%; max-width: 400px; text-align: center; }
        .wheel { width: 200px; height: 200px; border: 5px solid #e8304a; border-radius: 50%; margin: 20px auto; transition: transform 3s cubic-bezier(0.2, 0.8, 0.3, 1); display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; background: radial-gradient(circle, #e8304a, #000); }
    </style>
</head>
<body>
    <main class="container">
        <div class="item-detail">
            <div class="detail-image">
                <img src="static/images/default-item.png" id="mainImg">
            </div>
            <div class="detail-info">
                <h1 id="itemName">Nome do Produto</h1>
                <div class="price-tag" id="itemPrice">$0.00</div>
                <button class="buy-now-btn" onclick="document.getElementById('redeemModal').style.display='flex'">
                    <i class="fas fa-shopping-cart"></i> COMPRAR AGORA
                </button>
            </div>
        </div>
    </main>

    <div id="redeemModal" class="modal">
        <div class="modal-content">
            <h2><i class="fas fa-gift"></i> Spin to Win!</h2>
            <div class="wheel" id="wheel">SPIN</div>
            <button class="btn-primary" onclick="spinWheel()" id="spinBtn" style="background: #e8304a; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">GIRAR ROLETA</button>
            <p id="discountResult" style="margin-top: 15px; color: #00e5a0;"></p>
            <button onclick="document.getElementById('redeemModal').style.display='none'" style="margin-top: 10px; background: none; border: none; color: #7a6068; cursor: pointer;">Fechar</button>
        </div>
    </div>

    <script>
        function spinWheel() {
            const wheel = document.getElementById('wheel');
            const spinBtn = document.getElementById('spinBtn');
            const resultTxt = document.getElementById('discountResult');
            
            const randomDeg = Math.floor(Math.random() * 360) + 1440; // 4 voltas + aleatorio
            wheel.style.transform = `rotate(${randomDeg}deg)`;
            spinBtn.disabled = true;

            setTimeout(() => {
                const discounts = ["$1", "$2", "$5", "FRETE GRÁTIS", "$10", "50% OFF"];
                const prize = discounts[Math.floor(Math.random() * discounts.length)];
                resultTxt.innerText = "Você ganhou: " + prize + "!";
                alert("Parabéns! Você ganhou " + prize);
            }, 3100);
        }
    </script>
</body>
</html>
