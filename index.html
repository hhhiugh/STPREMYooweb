<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AccountHub - Marketplace</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <a href="index.html" class="logo">
                <i class="fas fa-cube"></i>
                <span>Account<span style="color: #ff9900;">Hub</span></span>
            </a>
            <nav class="main-nav">
                <a href="index.html">Início</a>
                <a href="admin.html">Admin</a>
            </nav>
        </div>
    </header>

    <section class="featured-items">
        <div class="container">
            <h2>Produtos em Destaque</h2>
            <div class="products-grid" id="productsDisplay">
                <div class="product-card">
                    <img src="static/images/default-item.png" alt="Produto">
                    <div class="product-info">
                        <h3>Carregando itens...</h3>
                        <p class="current-price">$0.00</p>
                        <button class="buy-now-btn" onclick="location.href='item.html'">Ver Detalhes</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Exemplo de como carregar os produtos manualmente ou via API
        const items = [
            { id: 1, name: "Netflix Premium", price: 9.99, image: "static/images/netflix.png" },
            { id: 2, name: "Spotify 1 Ano", price: 15.00, image: "static/images/spotify.png" }
        ];

        const container = document.getElementById('productsDisplay');
        if(items.length > 0) container.innerHTML = ''; // Limpa o "Carregando"

        items.forEach(item => {
            container.innerHTML += `
                <div class="product-card">
                    <img src="${item.image}" alt="${item.name}">
                    <div class="product-info">
                        <h3>${item.name}</h3>
                        <p class="current-price">$${item.price.toFixed(2)}</p>
                        <button class="buy-now-btn" onclick="location.href='item.html?id=${item.id}'">Comprar Agora</button>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
